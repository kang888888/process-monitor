<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>进程监控</title>
  <script src="lib/echarts.min.js"></script>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <header class="toolbar">
    <div class="control-group app-select-wrap">
      <label>应用</label>
      <div class="app-combo" id="appCombo">
        <div class="app-tags" id="appTags"></div>
        <input type="text" id="appInput" placeholder="搜索并选择应用（支持多选）" autocomplete="off" />
        <button type="button" class="app-combo-trigger" id="appComboTrigger" title="展开/收起">▾</button>
        <div id="appDropdown" class="app-dropdown hidden"></div>
      </div>
      <button id="btnRefresh">刷新应用</button>
    </div>
    <div class="control-group">
      <label>采集频率</label>
      <input type="range" id="freqSlider" min="200" max="5000" step="100" value="1000" />
      <span id="freqLabel">1.0 秒</span>
    </div>
    <div class="control-group">
      <button id="btnStart">开始收集</button>
      <button id="btnStop" class="hidden">结束收集</button>
    </div>
    <div class="control-group">
      <button id="btnExport">导出数据</button>
      <button id="btnImport">导入展示</button>
      <input id="fileImport" type="file" accept="application/json" class="hidden" />
    </div>
  </header>

  <main class="content">
    <section class="charts">
      <div class="chart-card">
        <h3>CPU (%) <span class="chart-note chart-app-note" id="chartCpuNote">当前应用</span></h3>
        <div id="chartCpu" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>内存 (MB) <span class="chart-note chart-app-note" id="chartMemNote">当前应用</span></h3>
        <div id="chartMem" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>GPU (%) <span class="chart-note chart-app-note" id="chartGpuNote">当前应用 · Windows</span></h3>
        <p class="chart-desc">3D 引擎利用率，与任务管理器对齐</p>
        <div id="chartGpu" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>磁盘 IO (MB/s) <span class="chart-note chart-app-note" id="chartDiskNote">当前应用</span></h3>
        <div class="chart-desc-row">
          <p class="chart-desc" id="chartDiskDesc">读/写为进程 io_counters 速率（已做 EMA 平滑）</p>
          <label class="chart-option" id="diskPdhOptionWrap">
            <input type="checkbox" id="diskPdhCheckbox" title="使用 PDH 性能计数器，与任务管理器“磁盘”列对齐（仅文件系统 IO，不含网络）" />
            <span>PDH（与任务管理器对齐）</span>
          </label>
        </div>
        <div id="chartDisk" class="chart"></div>
      </div>
      <div class="chart-card wide">
        <h3>网络 IO
          <span class="chart-unit-select">
            <label class="sr-only" for="netUnitSelect">纵轴单位</label>
            <select id="netUnitSelect" title="纵轴单位">
              <option value="KB/s">K/s</option>
              <option value="MB/s">MB/s</option>
              <option value="Mbps">Mbps</option>
            </select>
          </span>
          <span class="chart-note">整机网卡</span>
        </h3>
        <p class="chart-desc">整机网卡下行/上行速率</p>
        <div id="chartNet" class="chart chart-tall"></div>
      </div>
    </section>
    <aside class="sidebar">
      <h3>当前状态</h3>
      <p id="currentAppHint" class="current-app-hint hidden">监控中：<span id="currentAppNames"></span></p>
      <div id="statusPanel">
        <p>进程数: <span id="procCount" class="linklike" title="点击查看进程详情">-</span></p>
        <p>CPU: <span id="liveCpu">-</span> %</p>
        <p>内存: <span id="liveMem">-</span> MB</p>
        <p>GPU: <span id="liveGpu">-</span> %</p>
      </div>
    </aside>
  </main>

  <!-- 进程详情弹窗 -->
  <div id="procModalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="procModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 id="procModalTitle">进程详情</h3>
        <button id="procModalClose" class="modal-close" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div id="procModalMeta" class="modal-meta"></div>
        <div id="procModalContent" class="modal-content"></div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast toast--info hidden" role="status" aria-live="polite"></div>

  <!-- 通用弹窗 -->
  <div id="dialogOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
    <div class="modal dialog-modal">
      <div class="modal-header">
        <h3 id="dialogTitle">提示</h3>
        <button id="dialogClose" class="modal-close" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div id="dialogMessage" class="dialog-message"></div>
        <div id="dialogActions" class="dialog-actions"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
